services:
  app:
    build: .
    ports:
      - "5000:5000"
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
    env_file:
      - .env
    volumes:
      - .:/app
    command: gunicorn --bind 0.0.0.0:5000 --workers 1 --reload webapp:app
  redis:
    image: redis:latest
    command: redis-server --requirepass ${REDIS_PASSWORD}