{% extends "base.html" %}
{% block title %}Playlist parameters - Deezer Service by Goujon{% endblock %}
{% block content %}
  <form action="#" method="post" class="dz-card m-3 p-3">
    <div class="container text-end align-items-center mb-3">
    
      <div class="row align-items-center mb-3">
        <div class="col">
          <label for="playlist_name" class="form-label">Playlist name:</label>
        </div>
        <div class="col">
            <input type="text" name="playlist_name" class="form-control" aria-describedby="playlistNameHelpInline" required>
        </div>
      </div>
      
      <div class="row align-items-center mb-3">
        <div class="col">
          <label for="public_playlist" class="form-label">Public playlist ?</label>
        </div>
        <div class="col">
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" role="switch" name="public_playlist">
          </div>
        </div>
      </div>

      <div class="row align-items-center mb-3">
        <div class="col">
          <label for="mode" class="form-label">Artists selection:</label>
        </div>
        <div class="col">
          <div class="form-floating">
            <select class="form-select" aria-label="Default select example" name="mode_selection" id="mode">
              <option value="Favorites">From favorites</option>
              <option value="Flow">From Deezer flow</option>
              <option value="Manual">Manual</option>
            </select> 
            <label for="mode">Choose one:</label>
          </div>
        </div>
      </div>

      <div class="row align-items-center mb-3" id="artists_number_row">
        <div class="col">
          <label for="artists_number" class="form-label">Number of artists:</label>
        </div>
        <div class="col">
          <input type="number" name="artists_number" class="form-control" min="1" aria-describedby="artistsNumberHelpInline">
        </div>
      </div>

      <div class="row align-items-center mb-3" id="songs_number_row">
        <div class="col">
          <label for="songs_number" class="form-label">Number of songs per artist:</label>
        </div>
        <div class="col">
          <input type="number" name="songs_number" class="form-control" min="1" aria-describedby="songsNumberHelpInline">
        </div>
      </div>

      <div class="row align-items-center mb-3" id="relative_row">
        <div class="col">
          <label for="relative_switch" class="form-label">Include similar artists?</label>
        </div>
        <div class="col">
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" role="switch" name="related_artists" id="relative_switch">
          </div>
        </div>
      </div>

      <div class="row align-items-center m-3">
        <div class="col text-center">
          <button type="submit" class="btn btn-primary"><i class="bi bi-shuffle me-1"></i>Generate</button>
        </div>
      </div>
      
    </div>
  </form>

  <div class="row align-items-center m-3">
    <div class="col text-center">
      <a class="btn btn-danger" href="{{ url_for('logout') }}"><i class="bi bi-box-arrow-right me-1"></i>Logout</a>
    </div>
  </div>
{% endblock %}
{% block scripts %}
<script>
  $('#mode').change(function() {
      opt = $(this).val();
      if (opt=="Favorites") {
          $('#artists_number_row').removeClass('collapse', true);
      }else {
          $('#artists_number_row').addClass('collapse', true);
      }
  });
</script>
{% endblock %}
