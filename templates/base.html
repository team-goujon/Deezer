<!doctype html>
<html lang="en">
  <head>
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@800&display=swap" rel="stylesheet">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{% endblock %}</title>
    <style>
      h1 {
        font-family: 'Nunito', sans-serif;
        font-size: clamp(1.4rem, 5.5vw, 3.36rem);
        white-space: nowrap;
      }
      .dz-card {
        background: linear-gradient(180deg, #3d3d3d 0%, #1a3632 100%);
        border: 1px solid rgba(14, 148, 136, 0.25);
        border-top: 3px solid #0e9488;
        border-radius: 0.375rem;
      }
    </style>
  </head>

  <body class="p-3 mb-2 bg-dark text-white d-flex flex-column min-vh-100">
    <div class="container text-center flex-grow-1">

      <div class="row justify-content-center my-3 my-md-5">
        <div class="col-auto">
          <h1>Deezer Service by Goujon</h1>
        </div>
      </div>

      <div class="row justify-content-center">
        <div class="col-12 col-sm-auto">
          {% block content %}{% endblock %}
        </div>
      </div>

    </div>

    <footer class="text-center text-white-50 small py-3 border-top border-secondary">
      <div>v{{ app_version }} &middot; {{ app_date }}</div>
      <div>
        <a class="link-light text-decoration-none" href="https://github.com/AAubin" target="_blank" rel="noopener">AAubin</a>
        &middot;
        <a class="link-light text-decoration-none" href="https://github.com/SmartTomtom" target="_blank" rel="noopener">SmartTomtom</a>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
