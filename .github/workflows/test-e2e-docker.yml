name: E2E Tests (Docker)

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest,${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

  test:
    needs: build
    runs-on: ubuntu-latest
    
    services:
      deezer:
        image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
        options: >-
          -p 5000:5000
          --health-cmd="curl -f http://localhost:5000/login || exit 1"
          --health-interval=5s
          --health-timeout=2s
          --health-retries=5
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python for tests
        uses: actions/setup-python@v4
        with:
          python-version: '3.14'
          cache: 'pip'
      
      - name: Install test dependencies
        run: pip install pytest requests
      
      - name: Run E2E tests
        env:
          DEEZER_ARL: ${{ secrets.TEST_DEEZER_ARL }}
          DEEZER_SID: ${{ secrets.TEST_DEEZER_SID }}
        run: pytest tests/e2e --base-url=http://deezer:5000 -v

