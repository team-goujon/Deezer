name: check arl and sid used for tests

on: 
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches: [38-add-workflow-to-update-sid-and-arl-used-for-tests]

jobs:
  check-cookies:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'
      
      - name: Install check dependencies
        run: pip install requests
      
      - name: Check if ARL and SID cookies are valid for tests
        id: check_cookies
        continue-on-error: true
        env:
          DEEZER_ARL: ${{ secrets.TEST_DEEZER_ARL }}
          DEEZER_SID: ${{ secrets.TEST_DEEZER_SID }}
        run: python scripts/check_cookies.py
          
      - name: Generate a token
        if: steps.check_cookies.outcome == 'failure'
        id: generate-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Install renew dependencies
        if: steps.check_cookies.outcome == 'failure'
        run: pip install PyNaCl

      - name: Renew ARL and SID cookies if needed
        id: renew_cookies
        if: steps.check_cookies.outcome == 'failure'
        env:
          DEEZER_EMAIL: ${{ secrets.TEST_DEEZER_EMAIL }}
          DEEZER_PWD: ${{ secrets.TEST_DEEZER_PWD }}
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: python scripts/renew_cookies.py

      - name: Update README
        if: steps.check_cookies.outcome == 'failure' && steps.renew_cookies.outcome == 'success'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u '+%Y-%m-%d %H:%M UTC')
          sed -i "s/<!-- last-cookie-renewal -->.*/<!-- last-cookie-renewal -->Dernière mise à jour : $DATE/" README.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: update cookie renewal date"
          git push
